<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文本朗讀有聲書網站</title>
<style>
body{
  margin:0;
  font-family:"Microsoft JhengHei",Arial,sans-serif;
  background:linear-gradient(135deg,#fff7e6,#e8f3ff,#f4e8ff);
  color:#333;
}
header{
  text-align:center;
  padding:32px 16px;
  background:#ffffffdd;
  border-bottom:5px solid #ffd6a5;
}
h1{
  margin:0;
  color:#ff8a00;
  font-size:34px;
}
h2{
  color:#6b5cff;
}
main{
  max-width:1050px;
  margin:auto;
  padding:20px;
}
section,article,aside,footer{
  background:#ffffffdd;
  border-radius:22px;
  padding:18px;
  margin:18px 0;
  box-shadow:0 8px 20px #00000018;
}
textarea{
  width:100%;
  min-height:240px;
  font-size:18px;
  line-height:1.8;
  border:3px solid #ffd6a5;
  border-radius:18px;
  padding:14px;
  box-sizing:border-box;
  resize:vertical;
}
input,select,button{
  font-size:16px;
  border-radius:14px;
  border:2px solid #ffd6a5;
  padding:10px 14px;
  margin:6px 4px;
}
button{
  border:none;
  background:#ff9f43;
  color:white;
  cursor:pointer;
  font-weight:bold;
}
button:hover{
  background:#ff7f00;
}
button.secondary{
  background:#6b5cff;
}
button.secondary:hover{
  background:#5143e8;
}
button.stop{
  background:#ff4d6d;
}
button.stop:hover{
  background:#e63956;
}
label{
  display:inline-block;
  margin:8px 8px 8px 0;
}
progress{
  width:100%;
  height:24px;
}
.reader{
  font-size:22px;
  line-height:2;
  background:#fffaf0;
  border:3px dashed #ffd6a5;
}
mark{
  background:#ffe066;
  border-radius:8px;
  padding:2px 4px;
}
.small{
  color:#666;
  font-size:14px;
}
.list button{
  background:#48bfe3;
}
footer{
  text-align:center;
  color:#777;
}
</style>
</head>
<body>

<header>
  <h1>文本朗讀有聲書發音網站</h1>
  <p>可上傳 TXT 文本、貼上文章、分段朗讀、調整語速與聲音</p>
</header>

<main>

<section>
  <h2>一、上傳文本或貼上內容</h2>

  <label>
    上傳 TXT 檔案：
    <input id="fileInput" type="file" accept=".txt,text/plain">
  </label>

  <textarea id="textInput" placeholder="請貼上小說、課文、英文文章或有聲書文本..."></textarea>

  <button onclick="loadSample()">載入範例</button>
  <button class="secondary" onclick="clearText()">清空文字</button>
</section>

<section>
  <h2>二、朗讀設定</h2>

  <label>
    語言：
    <select id="langSelect">
      <option value="en-US">英文 English</option>
      <option value="zh-TW">繁體中文</option>
      <option value="ja-JP">日文</option>
      <option value="ko-KR">韓文</option>
      <option value="es-ES">西班牙文</option>
      <option value="pt-BR">葡萄牙文</option>
    </select>
  </label>

  <label>
    聲音：
    <select id="voiceSelect"></select>
  </label>

  <label>
    語速：
    <input id="rateInput" type="range" min="0.5" max="1.8" step="0.1" value="1">
    <output id="rateValue">1</output>
  </label>

  <label>
    音高：
    <input id="pitchInput" type="range" min="0.5" max="2" step="0.1" value="1">
    <output id="pitchValue">1</output>
  </label>

  <label>
    音量：
    <input id="volumeInput" type="range" min="0" max="1" step="0.1" value="1">
    <output id="volumeValue">1</output>
  </label>
</section>

<section>
  <h2>三、有聲書播放控制</h2>

  <button onclick="prepareBook()">整理文本</button>
  <button onclick="speakAll()">從頭朗讀</button>
  <button onclick="speakCurrent()">朗讀目前段落</button>
  <button onclick="pauseSpeech()">暫停</button>
  <button onclick="resumeSpeech()">繼續</button>
  <button class="stop" onclick="stopSpeech()">停止</button>

  <p id="statusText">狀態：尚未開始</p>
  <progress id="progressBar" value="0" max="100"></progress>
</section>

<section>
  <h2>四、目前朗讀內容</h2>
  <article id="readerBox" class="reader">請先上傳或貼上文本，再按「整理文本」。</article>
</section>

<aside>
  <h2>五、段落目錄</h2>
  <section id="chapterList" class="list"></section>
</aside>

</main>

<footer>
  <p>本網站使用瀏覽器內建 SpeechSynthesis 語音功能，不需外掛。</p>
</footer>

<script>
let paragraphs = [];
let currentIndex = 0;
let voices = [];
let isReadingAll = false;

const fileInput = document.getElementById("fileInput");
const textInput = document.getElementById("textInput");
const voiceSelect = document.getElementById("voiceSelect");
const langSelect = document.getElementById("langSelect");
const readerBox = document.getElementById("readerBox");
const statusText = document.getElementById("statusText");
const progressBar = document.getElementById("progressBar");
const chapterList = document.getElementById("chapterList");

fileInput.addEventListener("change", function(){
  const file = fileInput.files[0];
  if(!file){ return; }

  const reader = new FileReader();
  reader.onload = function(event){
    textInput.value = event.target.result;
    prepareBook();
  };
  reader.readAsText(file, "UTF-8");
});

document.getElementById("rateInput").addEventListener("input", function(){
  document.getElementById("rateValue").value = this.value;
});

document.getElementById("pitchInput").addEventListener("input", function(){
  document.getElementById("pitchValue").value = this.value;
});

document.getElementById("volumeInput").addEventListener("input", function(){
  document.getElementById("volumeValue").value = this.value;
});

function loadVoices(){
  voices = speechSynthesis.getVoices();
  voiceSelect.innerHTML = "";

  voices.forEach(function(voice,index){
    const option = document.createElement("option");
    option.value = index;
    option.textContent = voice.name + "（" + voice.lang + "）";
    voiceSelect.appendChild(option);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function getSelectedVoice(){
  const index = voiceSelect.value;
  return voices[index] || null;
}

function prepareBook(){
  stopSpeech();

  const text = textInput.value.trim();

  if(!text){
    readerBox.textContent = "請先貼上文字或上傳 TXT 檔案。";
    statusText.textContent = "狀態：沒有文本";
    return;
  }

  paragraphs = text
    .replace(/\r/g,"")
    .split(/\n+|(?<=[。！？.!?])\s+/)
    .map(function(item){ return item.trim(); })
    .filter(function(item){ return item.length > 0; });

  currentIndex = 0;
  renderCurrent();
  renderChapterList();
  updateProgress();

  statusText.textContent = "狀態：已整理成 " + paragraphs.length + " 個段落";
}

function renderCurrent(){
  if(paragraphs.length === 0){
    readerBox.textContent = "尚未整理文本。";
    return;
  }

  readerBox.innerHTML = "";
  const markTag = document.createElement("mark");
  markTag.textContent = paragraphs[currentIndex];
  readerBox.appendChild(markTag);
}

function renderChapterList(){
  chapterList.innerHTML = "";

  paragraphs.forEach(function(text,index){
    const button = document.createElement("button");
    button.textContent = "第 " + (index + 1) + " 段";
    button.onclick = function(){
      currentIndex = index;
      renderCurrent();
      updateProgress();
      speakCurrent();
    };
    chapterList.appendChild(button);
  });
}

function makeUtterance(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = langSelect.value;
  speech.rate = Number(document.getElementById("rateInput").value);
  speech.pitch = Number(document.getElementById("pitchInput").value);
  speech.volume = Number(document.getElementById("volumeInput").value);

  const selectedVoice = getSelectedVoice();
  if(selectedVoice){
    speech.voice = selectedVoice;
  }

  return speech;
}

function speakCurrent(){
  if(paragraphs.length === 0){
    prepareBook();
  }

  if(paragraphs.length === 0){
    return;
  }

  speechSynthesis.cancel();

  const speech = makeUtterance(paragraphs[currentIndex]);

  speech.onstart = function(){
    statusText.textContent = "狀態：正在朗讀第 " + (currentIndex + 1) + " 段";
    renderCurrent();
    updateProgress();
  };

  speech.onend = function(){
    statusText.textContent = "狀態：第 " + (currentIndex + 1) + " 段朗讀完成";
  };

  speechSynthesis.speak(speech);
}

function speakAll(){
  if(paragraphs.length === 0){
    prepareBook();
  }

  if(paragraphs.length === 0){
    return;
  }

  speechSynthesis.cancel();
  isReadingAll = true;
  currentIndex = 0;
  readNextParagraph();
}

function readNextParagraph(){
  if(!isReadingAll || currentIndex >= paragraphs.length){
    isReadingAll = false;
    statusText.textContent = "狀態：整本有聲書朗讀完成";
    progressBar.value = 100;
    return;
  }

  renderCurrent();
  updateProgress();

  const speech = makeUtterance(paragraphs[currentIndex]);

  speech.onstart = function(){
    statusText.textContent = "狀態：正在朗讀第 " + (currentIndex + 1) + " / " + paragraphs.length + " 段";
  };

  speech.onend = function(){
    currentIndex++;
    readNextParagraph();
  };

  speechSynthesis.speak(speech);
}

function pauseSpeech(){
  if(speechSynthesis.speaking){
    speechSynthesis.pause();
    statusText.textContent = "狀態：已暫停";
  }
}

function resumeSpeech(){
  if(speechSynthesis.paused){
    speechSynthesis.resume();
    statusText.textContent = "狀態：繼續朗讀";
  }
}

function stopSpeech(){
  isReadingAll = false;
  speechSynthesis.cancel();
  statusText.textContent = "狀態：已停止";
}

function updateProgress(){
  if(paragraphs.length === 0){
    progressBar.value = 0;
    return;
  }

  const percent = Math.round(((currentIndex + 1) / paragraphs.length) * 100);
  progressBar.value = percent;
}

function clearText(){
  stopSpeech();
  textInput.value = "";
  paragraphs = [];
  currentIndex = 0;
  readerBox.textContent = "請先上傳或貼上文本，再按「整理文本」。";
  chapterList.innerHTML = "";
  progressBar.value = 0;
  statusText.textContent = "狀態：已清空";
}

function loadSample(){
  textInput.value =
`Chapter One: The Magic Book

Luna found an old book in the library.

When she opened it, the pages began to glow.

A soft voice said, "Welcome to your first English audiobook lesson."

Luna smiled and listened carefully.

Today, she learned three words: book, light, and dream.`;

  prepareBook();
}
</script>

</body>
</html>
